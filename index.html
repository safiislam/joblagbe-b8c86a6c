    <style>
      /* Critical inline CSS to prevent FOIT and improve FCP/LCP */
      body { font-family: 'Inter', 'Hind Siliguri', sans-serif; margin: 0; background: #fff; color: hsl(210,29%,13%); }
      #root { min-height: 100vh; }
      .sk-header { height: 56px; border-bottom: 1px solid hsl(210,20%,90%); display: flex; align-items: center; padding: 0 1rem; }
      .sk-logo { width: 32px; height: 32px; border-radius: 8px; background: hsl(210,20%,96%); }
      .sk-hero { text-align: center; padding: 3.5rem 1rem 2rem; }
      .sk-badge { display: inline-block; background: hsl(210,20%,96%); border-radius: 9999px; height: 28px; width: 180px; margin-bottom: 1rem; }
      .sk-title { height: 2.5rem; width: 80%; max-width: 500px; margin: 0 auto 0.75rem; background: hsl(210,20%,96%); border-radius: 8px; }
      .sk-sub { height: 1rem; width: 60%; max-width: 380px; margin: 0 auto; background: hsl(210,20%,96%); border-radius: 6px; }
      .sk-search { max-width: 600px; margin: 1.5rem auto 0; height: 56px; border-radius: 1rem; border: 1px solid hsl(210,20%,90%); background: #fff; }
      @keyframes sk-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
      .sk-pulse { animation: sk-pulse 1.5s ease-in-out infinite; }
    </style>
    <title>Job লাগবে?</title>
